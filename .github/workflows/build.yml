name: Compile BIOS Engine

on: [push, pull_request]

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
            output: bios_engine_win_x64.dll
            compiler: g++
            flags: "-static -static-libgcc -static-libstdc++" # Bakes dependencies into the DLL
          - os: ubuntu-latest
            arch: x64
            output: bios_engine_linux_x64.so
            compiler: g++
            flags: "" # Linux doesn't need these specific static flags

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Compile C++ Engine
        shell: bash
        run: |
          mkdir -p bin
          ${{ matrix.compiler }} -shared -fPIC ${{ matrix.flags }} -o bin/${{ matrix.output }} src/bios_engine.cpp

      - name: Commit and Push Binaries Directly
        shell: bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add bin/${{ matrix.output }}
          if git diff --staged --quiet; then
            echo "No changes detected in compiled binaries."
          else
            git commit -m "Automated binary build: ${{ matrix.output }}"
            git pull --rebase origin ${{ github.head_ref || github.ref_name }}
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
          fi
